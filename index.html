<html lang="vi">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LOHO - Hệ thống quản lý kho</title>

@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');
@import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css');
:root{
  --brand:#0E4D8B;--brand2:#1B74C4;--brand-d:#0A3A6B;
  --ink:#15263b;--muted:#647489;--bg:#eef2f7;--surface:#fff;
  --line:#e7ecf3;--line2:#d7dfea;
  --green:#138a5e;--greenbg:#e7f6ee;--amber:#9a6a00;--amberbg:#fdf2d6;
  --red:#c2362b;--redbg:#fdeae7;--info:#0E4D8B;--infobg:#e9f1fb;
  --sh:0 1px 2px rgba(16,30,54,.05),0 4px 14px rgba(16,30,54,.05);
  --shlg:0 12px 34px rgba(16,30,54,.13);
  --r:13px;--rs:8px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-size:13.5px;font-family:"Be Vietnam Pro","Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
/* ===== APP LAYOUT ===== */
.app{display:flex;min-height:100vh}
.side{width:196px;flex-shrink:0;background:linear-gradient(165deg,#0A3A6B,#0E4D8B 58%,#1565ac);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;box-shadow:2px 0 16px rgba(10,58,107,.25);z-index:10}
.side-top{padding:15px 14px 11px;border-bottom:1px solid rgba(255,255,255,.13)}
.logo{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.logo-mark{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.2);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.5);flex-shrink:0}
.logo-sub{font-size:11px;opacity:.78;margin-top:3px}
.modsw{display:flex;gap:4px;margin:11px 12px 6px;background:rgba(255,255,255,.12);border-radius:9px;padding:3px}
.modsw span{flex:1;text-align:center;padding:6px 0;font-size:12px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.85);transition:.15s}
.modsw span:hover{background:rgba(255,255,255,.1)}
.modsw .on{background:#fff;color:var(--brand);font-weight:600}
.nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:6px 10px;overflow:auto}
.navitem{display:flex;align-items:center;gap:10px;border:none;background:none;color:rgba(255,255,255,.85);padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit;text-align:left;transition:.15s}
.navitem i{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.navitem span{display:flex;flex-direction:column;line-height:1.12}
.navitem small{font-size:9.5px;opacity:.68}
.navitem:hover{background:rgba(255,255,255,.1);color:#fff}
.navitem.on{background:rgba(255,255,255,.17);color:#fff;font-weight:600;box-shadow:inset 3px 0 0 #fff}
.side-role{padding:10px 12px;border-top:1px solid rgba(255,255,255,.13);display:flex;align-items:center;gap:7px;font-size:12px}
.side-role i{font-size:16px;opacity:.9}
.side-role select{flex:1;font-size:12px;padding:5px 7px;border-radius:7px;border:none;background:rgba(255,255,255,.92);color:var(--ink);font-family:inherit}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.wrap{padding:18px 22px;max-width:none;width:100%}
.panel{display:none;animation:fade .22s ease}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
/* ===== HEADINGS / BARS ===== */
.h{font-size:18px;font-weight:700;margin:0 0 3px;letter-spacing:-.2px}
.h .zh{font-size:12px;color:#334155;font-weight:600;margin-left:8px}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:13px 0}
.bar .sp{flex:1}
.sub{font-size:11.5px;color:var(--muted)}
/* ===== CONTROLS ===== */
input,select{padding:7px 10px;border:1px solid var(--line2);border-radius:var(--rs);font-size:12.5px;background:#fff;color:var(--ink);font-family:inherit;transition:.15s}
input:focus,select:focus{outline:none;border-color:var(--brand2);box-shadow:0 0 0 3px rgba(27,116,196,.14)}
button.btn{padding:7px 12px;border:1px solid var(--line2);background:#fff;border-radius:var(--rs);cursor:pointer;font-size:12.5px;font-weight:500;font-family:inherit;color:var(--ink);transition:.15s}
button.btn:hover{background:#f6f9fc;border-color:var(--brand2);box-shadow:var(--sh)}
button.pri{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff;border:none;box-shadow:0 3px 10px rgba(14,77,139,.25)}
button.pri:hover{filter:brightness(1.07)}
button.gr{color:var(--green);border-color:#bfe6d2;background:var(--greenbg)}
button.gr:hover{background:#dcf0e6;border-color:var(--green)}
/* ===== CARDS / KPI ===== */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--brand),var(--brand2))}
.kpi .l{font-size:11.5px;color:var(--muted);font-weight:500}
.kpi .l .zh{font-size:9.5px}
.kpi .v{font-size:25px;font-weight:700;margin-top:4px;letter-spacing:-.5px}
/* ===== TABLES ===== */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;background:var(--surface)}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
thead th{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff;font-weight:600;position:sticky;top:0;font-size:11.5px;border-bottom:none;white-space:nowrap;line-height:1.25}
th .zh{display:block;font-size:9px;color:rgba(255,255,255,.95);font-weight:500}
tbody tr:nth-child(even){background:#fafcfe}
tbody tr:hover{background:var(--infobg)}
td.r,th.r{text-align:right}
.mono{font-family:"SF Mono","Consolas",monospace;font-size:11.5px;color:#33485f}
/* combo con: nho + sat dong */
tr.child{color:var(--muted);background:#f7fafd!important}
tr.child td{padding:3px 10px;font-size:11px;border-bottom:1px dotted var(--line)}
tr.child .mono{font-size:10.5px}
/* ===== TAGS ===== */
.tag{font-size:10.5px;padding:2px 9px;border-radius:999px;display:inline-block;font-weight:600;line-height:1.5}
.t-ok{background:var(--greenbg);color:var(--green)}
.t-warn{background:var(--amberbg);color:var(--amber)}
.t-red{background:var(--redbg);color:var(--red)}
.t-info{background:var(--infobg);color:var(--info)}
/* ===== SUB TABS ===== */
.tabs2{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.tabs2 button{padding:7px 15px;border:1px solid var(--line2);background:#fff;border-radius:999px;cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:500;font-family:inherit;transition:.15s}
.tabs2 button:hover{border-color:var(--brand2);color:var(--brand)}
.tabs2 button.on{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(14,77,139,.22)}
.scroll{overflow:auto;max-height:74vh}
.scroll thead tr:first-child th{z-index:7}
.scroll thead tr:nth-child(2) th{top:35px;z-index:6}
.scroll tbody tr:first-child th{position:sticky;top:0;z-index:6;background:#eef2f7}
.note{background:linear-gradient(120deg,#f3f8fd,#eef4fb);border:1px solid var(--line);border-left:3px solid var(--brand2);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:#3a4a60;margin:12px 0}
/* ===== AUTOCOMPLETE / DROPDOWN ===== */
.dropdown{position:relative}
.ac{position:absolute;z-index:30;left:0;right:0;background:#fff;border:1px solid var(--line2);border-top:none;border-radius:0 0 11px 11px;max-height:240px;overflow:auto;box-shadow:var(--shlg)}
.ac div{padding:8px 11px;cursor:pointer;display:flex;gap:9px;font-size:12.5px;align-items:center;border-bottom:1px solid var(--line)}
.ac div:hover{background:var(--infobg)}
/* ===== BARS CHART ===== */
.bars{display:flex;flex-direction:column;gap:10px}
.bars .row{display:flex;align-items:center;gap:9px;font-size:12px}
.bars .lab{width:92px;color:var(--muted)}
.bars .track{flex:1;background:#eef1f6;border-radius:6px;height:10px;overflow:hidden}
.bars .fill{background:linear-gradient(90deg,var(--brand),var(--brand2));height:10px;border-radius:6px}
@media print{.side,.bar,.tabs2{display:none!important}.wrap{padding:0}.card{box-shadow:none}.main{display:block}}

/* ===== PHIEU IN ===== */
.printonly{display:none}
@media print{ body *{visibility:hidden!important} #printArea,#printArea *{visibility:visible!important} #printArea{display:block!important;position:absolute;left:0;top:0;width:100%} .side{display:none!important} }
.ph{padding:8px 12px;color:#000;font-family:"Times New Roman",serif}
.ph-h{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:6px}
.ph-h .ttl{font-size:15px;font-weight:700}
.ph-h .meta{text-align:right;font-size:11.5px}
.ph-sub{font-size:11.5px;margin:5px 0 8px;display:flex;gap:24px}
.ph-t{width:100%;border-collapse:collapse}
.ph-t th,.ph-t td{border:1px solid #444;padding:4px 6px;font-size:11px;vertical-align:top}
.ph-t th{background:#e8eef6;font-weight:700;text-align:center}
.ph-t .c{text-align:center}
.ph-t .mau{font-weight:700;background:#fff7e6}
.ph-t .qua{color:#0E4D8B;font-weight:700}
.ph-foot{display:flex;justify-content:space-around;margin-top:18px;font-size:11.5px}
</style>
</head>

/* ============ HELPERS ============ */
function P(code){return DATA.products.find(p=>p.code===code)||null;}
function nm(code){var p=P(code);return p?p.vi:'';}
function zh(code){var p=P(code);return p?p.zh:'';}
function unit(code){var p=P(code);return p?p.unit:'';}
function num(n){return (n==null||n==='')?'':Number(n).toLocaleString('vi-VN');}
function explode(code,qty){var b=DATA.bom[code];if(b&&b.length){return b.map(c=>({code:c.code,qty:c.qty*qty,child:true}));}return [{code:code,qty:qty,child:false}];}
function backfillGio(){ (DATA.orders||[]).forEach(function(o){ if(!o.gio && o.dot && (''+o.dot).indexOf(' ')>=0) o.gio=(''+o.dot).split(' ')[1]; }); }
function normalizeCombos(){ (DATA.products||[]).forEach(function(p){ if(p.items&&p.items.length){ p.combo=true; p.type='Combo'; if(!DATA.bom)DATA.bom={}; if(!DATA.bom[p.code]||!DATA.bom[p.code].length)DATA.bom[p.code]=p.items.slice(); } }); }

  ensureRecIds();
  var base=SYNC.base||{}, now=Date.now(), deletes={};
  SYNC_COLLS.forEach(function(coll){
    var kf=SYNC_MK[coll], bmap={}, cmap={};
    (base[coll]||[]).forEach(function(r){ bmap[kf(r)]=r; });
    (DATA[coll]||[]).forEach(function(r){ var k=kf(r); cmap[k]=1; var b=bmap[k];
      var changed = !b || JSON.stringify(_noMetaC(r))!==JSON.stringify(_noMetaC(b));
      if(changed) r._ts=now; else if(r._ts==null) r._ts=(b&&b._ts)||0; });

    if(del.length) deletes[coll]=del;

function spDrop(t){ if(!spDragCode){return;}

    if(p.combo){var its=(p.items&&p.items.length)?p.items:(DATA.bom[p.code]||[]); its.forEach(c=>{h+=`<tr class="child"><td></td><td></td><td></td><td></td><td class="mono">↳ ${c.code}</td><td colspan="8">${nm(c.code)}</td><td class="r">× ${c.qty}</td><td></td></tr>`;});}

function dichTrung(force){var v=el('f_vi'),z=el('f_zh');if(!v||!z)return;var vi=v.value.trim();if(!vi)return;if(!force&&z.value.trim())return;var old=z.value;z.value='… đang dịch';fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=vi&tl=zh-TW&dt=t&q='+encodeURIComponent(vi)).then(r=>r.json()).then(d=>{var t=((d&&d[0])||[]).map(x=>x[0]).join('');z.value=t||old;}).catch(e=>{z.value=old;if(force)alert('Chưa dịch được (cần mạng). Vui lòng gõ tay 中文.');});}

function delSP(code){if(!confirm('Xoá '+code+' ?'))return;DATA.products=DATA.products.filter(p=>p.code!==code);delete DATA.bom[code];save();closeModal();buildGroupSel();drawSp();}
function openCombo(code){
  spEdit=code; var p=code?P(code):{code:'',vi:'',zh:'',ck:'congcu',unit:'bộ',status:'active'};
  comboRows=((p.items&&p.items.length)?p.items:(DATA.bom[code]||[])).map(x=>({code:x.code,qty:x.qty}));
  var catOpts=Object.keys(DATA.cats).map(ck=>`<option value="${ck}" ${p.ck===ck?'selected':''}>${DATA.cats[ck]}</option>`).join('');
  var stOpts=Object.keys(DATA.statusMap).map(s=>`<option value="${s}" ${(p.status||'active')===s?'selected':''}>${DATA.statusMap[s]}</option>`).join('');
  modal(`<div style="padding:16px 20px;border-bottom:1px solid var(--line);font-weight:700;font-size:16px">${code?'Sửa combo':'Thêm combo'} / 套裝</div>
   <div style="padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
     ${fld('Mã combo *','f_code',p.code)}
     ${fld('ĐVT','f_unit',p.unit||'bộ')}
     <div style="grid-column:1/3"><label class="sub">Tên Việt *</label><input id="f_vi" value="${(p.vi||'').replace(/"/g,'&quot;')}" onblur="autoDich()" style="width:100%"></div>
     <div style="grid-column:1/3"><label class="sub">中文 <span style="font-weight:400;color:var(--muted)">(tự dịch)</span></label><div style="display:flex;gap:6px"><input id="f_zh" value="${(p.zh||'').replace(/"/g,'&quot;')}" style="flex:1"><button type="button" class="btn" onclick="dichTrung(true)">🌐 Dịch</button></div></div>
     <div><label class="sub">Nhóm</label><select id="f_ck" style="width:100%">${catOpts}</select></div>
     <div><label class="sub">Trạng thái</label><select id="f_status" style="width:100%">${stOpts}</select></div>
   </div>
   <div style="padding:0 20px 6px"><b>Thành phần combo / 組成</b> <span class="sub">(gõ mã hoặc tên để tìm)</span></div>
   <div style="padding:0 20px;display:flex;gap:8px;align-items:center">
     <div class="dropdown" style="flex:1"><input id="cb_code" placeholder="Tìm SP thành phần…" style="width:100%" oninput="cbAc(this.value)" autocomplete="off"><div class="ac" id="cb_ac"></div></div>
     <input id="cb_qty" type="number" value="1" min="1" style="width:74px">
     <button class="btn pri" onclick="addComboRow()">+ Thêm</button>
   </div>
   <div style="padding:8px 20px"><table id="cbTbl"></table></div>
   <div style="padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px">
     ${code?`<button class="btn" style="color:var(--red);margin-right:auto" onclick="delSP('${code}')">Xoá</button>`:''}
     <button class="btn" onclick="closeModal()">Huỷ</button><button class="btn pri" onclick="saveCombo()">Lưu combo</button></div>`);
  drawComboRows();
}
let cbPick=null;
function cbAc(q){q=(q||'').toLowerCase();var box=el('cb_ac');if(!q){box.innerHTML='';cbPick=null;return;}
  var nd=s=>s.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/g,'d');
  var r=DATA.products.filter(p=>!p.combo&&nd((p.code+' '+p.vi+' '+(p.zh||'')).toLowerCase()).indexOf(nd(q))>=0).slice(0,8);
  box.innerHTML=r.map(p=>`<div onmousedown="cbSel('${p.code}')"><span class="mono">${p.code}</span><span>${p.vi}</span><span class="sp" style="flex:1"></span><span class="sub">${p.unit}</span></div>`).join('')||'<div class="sub" style="padding:8px">Không có SP khớp</div>';}
function cbSel(code){cbPick=code;el('cb_code').value=code+' — '+nm(code);el('cb_ac').innerHTML='';}
function addComboRow(){var c=cbPick||(el('cb_code').value.trim().split(' ')[0]),q=Number(el('cb_qty').value)||1;
  if(!c||!P(c)){alert('Chọn SP thành phần hợp lệ từ danh sách gợi ý');return;}
  if(P(c).combo){alert('Không thể thêm combo vào trong combo');return;}
  var ex=comboRows.find(r=>r.code===c);if(ex)ex.qty+=q;else comboRows.push({code:c,qty:q});
  cbPick=null;el('cb_code').value='';el('cb_qty').value=1;drawComboRows();el('cb_code').focus();}
function drawComboRows(){var h=`<tr><th>Mã</th><th>Tên SP</th><th>ĐVT</th><th class="r">SL</th><th></th></tr>`;
  if(!comboRows.length)h+=`<tr><td colspan="5" class="sub" style="text-align:center;padding:14px">Chưa thêm SP nào vào combo</td></tr>`;
  comboRows.forEach((r,i)=>h+=`<tr><td class="mono">${r.code}</td><td>${nm(r.code)}</td><td>${unit(r.code)}</td><td class="r"><input type="number" value="${r.qty}" min="1" style="width:60px;text-align:right" onchange="comboRows[${i}].qty=Number(this.value)||1"></td><td><button class="btn" style="padding:2px 8px;color:var(--red)" onclick="comboRows.splice(${i},1);drawComboRows()">×</button></td></tr>`);
  el('cbTbl').innerHTML=h;}
function saveCombo(){var code=el('f_code').value.trim();if(!code||!el('f_vi').value.trim()){alert('Cần mã + tên combo');return;}
  if(!comboRows.length){ if(!confirm('Combo chưa có thành phần. Vẫn lưu? (chưa trừ được tồn SP đơn cho tới khi thêm thành phần)')) return; }
  var ck=el('f_ck').value;var obj={code,vi:el('f_vi').value.trim(),zh:el('f_zh').value.trim(),type:'Combo',ck,cat:DATA.cats[ck],unit:el('f_unit').value||'bộ',size:'',color:'',status:el('f_status').value,ch:['shopee','tiktok','website'],combo:true,items:comboRows.slice()};
  if(spEdit){ var orig=DATA.products.find(p=>p.code===spEdit); if(orig)Object.assign(orig,obj); else DATA.products.push(obj); if(spEdit!==code)delete DATA.bom[spEdit]; }
  else{ if(DATA.products.find(p=>p.code===code)){alert('Mã đã tồn tại');return;} DATA.products.push(obj); }
  DATA.bom[code]=comboRows.slice();save();closeModal();buildGroupSel();drawSp();
}
function exportSPJSON(){var b=new Blob([JSON.stringify(DATA.products,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='San pham Loho.json';a.click();}
function importSPJSON(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=e=>{try{var arr=JSON.parse(e.target.result);if(!Array.isArray(arr)){alert('File cần là mảng sản phẩm');return;}DATA.products=arr;save();buildGroupSel();drawSp();alert('Đã nhập '+arr.length+' sản phẩm');}catch(err){alert('Lỗi JSON: '+err.message);}};r.readAsText(f);}
function spImg(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=e=>{el('f_img').value=e.target.result;var pv=el('f_imgPrev');if(pv){pv.src=e.target.result;pv.style.display='';}};r.readAsDataURL(f);}
function spImgClear(){if(el('f_img'))el('f_img').value='';var pv=el('f_imgPrev');if(pv){pv.src='';pv.style.display='none';}}
/* ===== Tạo mã sản phẩm thông minh ===== */
var CAT_PREFIX={son:'SM-',san:'LS-',congcu:'CC-',vo:'VO-',thunggiay:'TG-',ccdonggoi:'BK-',gd_tuong:'GI-TU-',gd_bep:'GI-BE-',gd_noithat:'GI-NT-',tham:'TT-TH-',tuigio:'TT-TU-',dongho:'TT-DH-',trangtri:'TT-',changa:'GA-',tet:'TET-',moctreo:'MT-',quatang:'QT-',donoithat:'NT-',diy:'DIY-',other:'SP-'};
function cgPrefix(ck){return CAT_PREFIX[ck]||'SP-';}
function taoMaSP(){ // mở modal tạo mã thông minh
  var catOpts=Object.keys(DATA.cats).map(ck=>`<option value="${ck}">${DATA.cats[ck]}</option>`).join('');
  modal(`<div style="padding:14px 20px;border-bottom:1px solid var(--line);font-weight:700;font-size:16px">🏷 Tạo mã sản phẩm thông minh</div>
   <div style="padding:16px 20px">
    <div class="sub" style="margin-bottom:10px">Cấu trúc: <b>[Prefix nhóm]-[Mã phụ]-[Số tự tăng][Hậu tố]</b></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <label class="sub">Phân loại<select id="cg-type" onchange="cgPreview()"><option value="tp">Thành phẩm</option><option value="nvl">Nguyên vật liệu</option></select></label>
      <label class="sub">Nhóm SP<select id="cg-cat" onchange="cgPreview()">${catOpts}</select></label>
      <label class="sub">Prefix<input id="cg-prefix" readonly style="background:#f1f4f8;font-weight:700"></label>
      <label class="sub">Mã phụ (tuỳ chọn)<input id="cg-sub" placeholder="VD: V01, 5M" oninput="cgPreview()"></label>
      <label class="sub">Số bắt đầu<input id="cg-start" type="number" value="1" oninput="cgPreview()"></label>
      <label class="sub">Hậu tố (tuỳ chọn)<input id="cg-suffix" placeholder="VD: TR, TS" oninput="cgPreview()"></label>
      <label class="sub">Số lượng cần tạo<input id="cg-count" type="number" value="5" oninput="cgPreview()"></label>
      <label class="sub">Số chữ số (padding)<select id="cg-pad" onchange="cgPreview()"><option value="3">3 (001)</option><option value="4">4 (0001)</option><option value="5" selected>5 (00001)</option></select></label>
    </div>
    <div class="card" style="margin-top:12px;padding:12px"><b class="sub">Xem trước mã được tạo:</b><div id="cg-preview" style="margin-top:8px;display:flex;flex-direction:column;gap:4px;font-size:13px"></div></div>
    <div class="note" style="margin-top:10px"><b>Phân tích mã hiện tại:</b><div id="cg-analysis" style="margin-top:6px;font-size:11.5px;line-height:1.6"></div></div>
   </div>
   <div style="padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px">
     <button class="btn" onclick="closeModal()">Đóng</button><button class="btn pri" onclick="cgCopyAll()">📋 Copy tất cả</button></div>`);
  cgPreview();cgAnalyze();
}
function cgPreview(){var ck=el('cg-cat').value;var prefix=cgPrefix(ck);el('cg-prefix').value=prefix;
  var sub=el('cg-sub').value.trim(),suf=el('cg-suffix').value.trim(),start=+el('cg-start').value||1,count=Math.min(+el('cg-count').value||5,50),pad=+el('cg-pad').value||5;
  var html='';for(var i=0;i<count;i++){var num=String(start+i).padStart(pad,'0');var code=prefix+(sub?sub+'-':'')+num+(suf||'');var ex=!!P(code);
    html+=`<div style="display:flex;gap:8px;align-items:center"><span style="color:${ex?'var(--red)':'var(--green)'}">${ex?'⚠':'✓'}</span><b class="mono">${code}</b>${ex?'<span style="font-size:10px;color:var(--red)">(đã tồn tại)</span>':''}</div>`;}
  el('cg-preview').innerHTML=html; cgAnalyze();
}
function cgAnalyze(){var a={};DATA.products.forEach(p=>{var m=p.code.match(/^([A-Z]+-(?:[A-Z]+-)?)/);if(m){var pf=m[1];if(!a[pf])a[pf]={c:0,ex:[]};a[pf].c++;if(a[pf].ex.length<3)a[pf].ex.push(p.code);}});
  var sorted=Object.entries(a).sort((x,y)=>y[1].c-x[1].c).slice(0,10);
  el('cg-analysis').innerHTML=sorted.map(([pf,info])=>`<div><b class="mono" style="color:#9a6a00">${pf}</b> — ${info.c} SP (VD: ${info.ex.join(', ')})</div>`).join('')||'Không có dữ liệu';
}
function cgCopyAll(){var codes=[...el('cg-preview').querySelectorAll('b')].map(b=>b.textContent);if(!codes.length)return;var t=codes.join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>alert('Đã copy '+codes.length+' mã!')).catch(()=>cgCopyFallback(t,codes.length));else cgCopyFallback(t,codes.length);}
function cgCopyFallback(t,n){var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);alert('Đã copy '+n+' mã!');}
/* ===== Import / Cập nhật sản phẩm hàng loạt (CSV) ===== */
var impData=[];
function openImportModal(){impData=[];
  modal(`<div style="padding:14px 20px;border-bottom:1px solid var(--line);font-weight:700;font-size:16px">📥 Import / Cập nhật sản phẩm hàng loạt</div>
   <div style="padding:16px 20px">
     <div style="display:flex;gap:10px;margin-bottom:12px">
       <button class="btn" style="flex:1" onclick="impTpl(0)">📋 Tải form mẫu (trống)</button>
       <button class="btn" style="flex:1" onclick="impTpl(1)">📋 Tải form mẫu (có dữ liệu mẫu)</button>
     </div>
     <div id="imp-zone" ondragover="event.preventDefault();this.style.background='#eef4fb'" ondragleave="this.style.background=''" ondrop="impDrop(event)" onclick="el('imp-file').click()" style="border:2px dashed var(--line2);border-radius:12px;padding:34px;text-align:center;cursor:pointer;color:var(--muted)">
       <div style="font-size:30px">🗎</div>
       <div style="margin-top:8px">Kéo thả file CSV vào đây hoặc bấm để chọn file</div>
       <div class="sub" style="margin-top:6px">Hỗ trợ .csv — Cột bắt buộc: <b>Mã SP, Tên VN</b>. Cột tuỳ chọn: Tên TQ, Loại, Nhóm, ĐVT, Kích cỡ, NCC, Nơi bán, Trạng thái</div>
       <input id="imp-file" type="file" accept=".csv" style="display:none" onchange="impFile(event)">
     </div>
     <div id="imp-preview" style="margin-top:12px;display:none"></div>
   </div>
   <div style="padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px">
     <button class="btn pri" id="imp-apply" style="display:none" onclick="impApply()">✓ Áp dụng</button>
     <button class="btn" onclick="closeModal()">Huỷ</button></div>`);
}
function impTpl(filled){var cats=Object.values(DATA.cats).join(' / ');
  var hdr=['Mã SP','Tên VN','Tên TQ','Loại (Thành phẩm/Nguyên vật liệu)','Nhóm ('+cats+')','ĐVT','Kích cỡ','NCC','Nơi bán (shopee;tiktok;lazada;website)','Trạng thái (Đang bán/Tạm ngưng/Ngưng bán)'];
  var csv='﻿'+hdr.join(',')+'\n';
  if(filled)csv+='"SM-V01-XX","Sơn mẫu ABC 1kg","白色平光漆-1kg","Thành phẩm","Sơn","lon","1kg","","shopee;tiktok;website","Đang bán"\n"CC-XXXX","Cọ sơn mini 2 inch","小刷子2寸","Thành phẩm","Công cụ","cái","2 inch","","shopee;tiktok;lazada;website","Đang bán"\n';
  else csv+='"","","","Thành phẩm","","cái","","","shopee;tiktok;website","Đang bán"\n';
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=filled?'Loho_Import_Mau.csv':'Loho_Import_Trong.csv';a.click();}
function impDrop(e){e.preventDefault();var z=el('imp-zone');if(z)z.style.background='';var f=e.dataTransfer.files[0];if(f)impParse(f);}
function impFile(e){var f=e.target.files[0];if(f)impParse(f);}
function csvLine(line){var r=[],cur='',q=false;for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){r.push(cur);cur='';}else cur+=c;}r.push(cur);return r;}
function impParseStatus(s){if(/bán|active/i.test(s))return 'active';if(/ngưng bán|ngưng b|stop/i.test(s))return 'stopped';if(/tạm|paus/i.test(s))return 'paused';return 'active';}
function impParse(file){var rd=new FileReader();rd.onload=function(e){
  var text=e.target.result.replace(/^﻿/,'');var lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){alert('File rỗng hoặc không hợp lệ');return;}
  var hdr=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  var ci=hdr.findIndex(h=>/mã|code/i.test(h)),ni=hdr.findIndex(h=>/tên.*vn|^tên|name/i.test(h));
  if(ci<0||ni<0){alert('Cần có cột "Mã SP" và "Tên VN"');return;}
  var cni=hdr.findIndex(h=>/tên.*tq|tq|cn|中/i.test(h)),ti=hdr.findIndex(h=>/loại|type|phân/i.test(h)),gi=hdr.findIndex(h=>/nhóm|cat|group/i.test(h)),ui=hdr.findIndex(h=>/đvt|unit/i.test(h)),si=hdr.findIndex(h=>/kích|size/i.test(h)),nci=hdr.findIndex(h=>/ncc|supplier/i.test(h)),chi=hdr.findIndex(h=>/nơi.*bán|channel/i.test(h)),sti=hdr.findIndex(h=>/trạng|status/i.test(h));
  impData=[];
  for(var i=1;i<lines.length;i++){var cols=csvLine(lines[i]);var code=(cols[ci]||'').trim(),name=(cols[ni]||'').trim();if(!code&&!name)continue;
    var ex=DATA.products.find(p=>p.code===code);
    var catName=gi>=0?(cols[gi]||'').trim():'';var ck=catName?(Object.keys(DATA.cats).find(k=>DATA.cats[k]===catName||k===catName)||'other'):'other';
    var typeName=ti>=0?(cols[ti]||'').trim():'';var type=/nvl|nguyên/i.test(typeName)?'NVL':'Thành phẩm';
    impData.push({code,vi:name,zh:cni>=0?(cols[cni]||'').trim():'',type,ck,unit:ui>=0?(cols[ui]||'').trim():'cái',size:si>=0?(cols[si]||'').trim():'',supplier:nci>=0?(cols[nci]||'').trim():'',
      ch:chi>=0?((cols[chi]||'').split(';').map(c=>c.trim().toLowerCase()).filter(Boolean)):['shopee','tiktok','website'],
      status:sti>=0?impParseStatus((cols[sti]||'').trim()):'active',action:ex?'update':'new',err:!code?'Thiếu mã':(!name?'Thiếu tên':null)});}
  impPreview();
};rd.readAsText(file);}
function impPreview(){var nNew=impData.filter(r=>r.action==='new'&&!r.err).length,nUpd=impData.filter(r=>r.action==='update'&&!r.err).length,nErr=impData.filter(r=>r.err).length;
  var rows=impData.slice(0,60).map(r=>`<tr><td><span class="tag ${r.err?'t-red':(r.action==='new'?'t-ok':'t-warn')}">${r.err||(r.action==='new'?'Mới':'Cập nhật')}</span></td><td class="mono">${r.code}</td><td>${r.vi}</td><td>${DATA.cats[r.ck]||r.ck}</td><td>${r.type==='NVL'?'NVL':'TP'}</td></tr>`).join('');
  el('imp-preview').style.display='';
  el('imp-preview').innerHTML=`<div class="sub" style="margin-bottom:6px">Tổng <b>${impData.length}</b> dòng · Mới: <b style="color:var(--green)">${nNew}</b> · Cập nhật: <b style="color:var(--amber)">${nUpd}</b> · Lỗi: <b style="color:var(--red)">${nErr}</b></div>
    <div class="card scroll" style="max-height:300px"><table><tr><th>Hành động</th><th>Mã SP</th><th>Tên VN</th><th>Nhóm</th><th>Loại</th></tr>${rows}</table></div>`;
  el('imp-apply').style.display=(nNew+nUpd)>0?'':'none';
}
function impApply(){var n=0,u=0;impData.forEach(r=>{if(r.err)return;
  var obj={code:r.code,vi:r.vi,zh:r.zh,type:r.type,ck:r.ck,cat:DATA.cats[r.ck]||r.ck,unit:r.unit,size:r.size,color:'',supplier:r.supplier,status:r.status,ch:r.ch,combo:false,items:[]};
  var ex=DATA.products.find(p=>p.code===r.code);if(ex){Object.assign(ex,obj);u++;}else{DATA.products.push(obj);n++;}});
  save();closeModal();buildGroupSel();drawSp();alert('Đã import: thêm '+n+' SP, cập nhật '+u+' SP.');}
function quanLyDanhMuc(){
  var cnt={};DATA.products.forEach(p=>{cnt[p.ck]=(cnt[p.ck]||0)+1;});
  var rows=Object.keys(DATA.cats).map(ck=>`<tr><td class="mono">${ck}</td><td><input value="${(DATA.cats[ck]||'').replace(/"/g,'&quot;')}" onchange="dmRename('${ck}',this.value)" style="width:100%"></td><td class="r">${cnt[ck]||0}</td><td><button class="btn" style="padding:1px 7px;color:var(--red)" onclick="dmDel('${ck}')">🗑</button></td></tr>`).join('');
  modal(`<div style="padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:16px">⊕ Quản lý danh mục / nhóm sản phẩm</div>
   <div style="padding:16px 18px">
     <div class="bar"><input id="dmKey" placeholder="Mã nhóm (vd: phukien)" style="width:170px"><input id="dmLabel" placeholder="Tên hiển thị (vd: Phụ kiện)" style="flex:1"><button class="btn pri" onclick="dmAdd()">+ Thêm nhóm</button></div>
     <div class="card scroll" style="max-height:340px;margin-top:10px"><table><tr><th>Mã nhóm</th><th>Tên hiển thị</th><th class="r">Số SP</th><th></th></tr>${rows||'<tr><td colspan=4 class="sub">Chưa có nhóm</td></tr>'}</table></div>
     <div class="note">Sửa tên nhóm: gõ trực tiếp vào ô rồi rời chuột. Chỉ xoá được nhóm không còn sản phẩm (đổi nhóm cho SP trước qua thanh hàng loạt).</div>
   </div>
   <div style="padding:12px 18px;border-top:1px solid var(--line);text-align:right"><button class="btn pri" onclick="closeModal();drawSp()">Đóng</button></div>`);

  });

let nxSub='xuat';

function rNhapxuat(){ ensureNx();
  el('p-nhapxuat').innerHTML=H('Xuất–Nhập kho sản xuất','產品出入庫')+`

  ${(function(){var ms=uniq(DATA.nx.map(function(r){return (r.ngay||'').slice(0,7);}).filter(Boolean)).sort();return '<div class="bar"><button class="btn pri" onclick="nxForm()">+ Thêm phiếu '+(nxSub==='xuat'?'xuất 出庫單':'nhập 入庫單')+'</button><select id="nxThang" onchange="nxApply()"><option value="">Tháng 月份: tất cả</option>'+ms.map(function(m){return '<option '+(nxF.thang===m?'selected':'')+'>'+m+'</option>';}).join('')+'</select><span class="sub">Từ 從</span><input id="nxTu" type="date" value="'+nxF.tuNgay+'" onchange="nxApply()" style="width:140px"><span class="sub">đến 到</span><input id="nxDen" type="date" value="'+nxF.denNgay+'" onchange="nxApply()" style="width:140px"><div class="sp"></div><button class="btn gr" onclick="exportXLSX(\'tblNx\',\''+(nxSub==='xuat'?'Xuat kho':'Nhap kho')+'\')">⬇ Excel 匯出</button></div>';})()}
  <div class="card scroll"><table id="tblNx"></table></div>
  <div class="note">${nxSub==='xuat'?'<b>Xuất kho sản xuất</b> (tiêu hao NVL khi chiết/pha…) — tự trừ vào cột <b>Sản xuất</b> của Theo dõi tồn. Mã: <b>XK+YYMMDD+STT tháng</b>.':'<b>Nhập kho</b> (mua thêm / sản xuất ra thành phẩm) — tự cộng vào cột <b>Nhập kho</b> của Theo dõi tồn. Mã: <b>NK+YYMMDD+STT tháng</b>.'}</div>`;
  var h=`<tr><th>Mã ${nxSub==='xuat'?'XK':'NK'}<br><span class="zh">單號</span></th><th>Ngày<br><span class="zh">日期</span></th><th>Mã SKU<br><span class="zh">編號</span></th><th>Tên sản phẩm<br><span class="zh">品名</span></th><th>ĐVT<br><span class="zh">單位</span></th><th>Mục đích<br><span class="zh">目的</span></th><th class="r">Số lượng<br><span class="zh">數量</span></th><th>Người<br><span class="zh">人員</span></th><th>Chú thích<br><span class="zh">備註</span></th><th></th></tr>`;

function nxForm(){ ensureNx();var today=new Date().toISOString().slice(0,10);

function nxPurRename(i,v){v=(v||'').trim();if(!v)return;DATA.nxPurposes[i]=v;save();}

function ensureSkumap(){
  if(!DATA.skumap){DATA.skumap={rules:[
    {pat:'L-SM-*-01P',kenh:'',type:'son1kg',sys:'SM-V01-BP',name:'Sơn base P - 1 kg'},
    {pat:'L-SM-*-01D',kenh:'',type:'son1kg',sys:'SM-V01-BD',name:'Sơn base D - 1 kg'},
    {pat:'L-SM-*-01A',kenh:'',type:'son1kg',sys:'SM-V01-BA',name:'Sơn base A - 1 kg'},
    {pat:'L-MZ-*-50P',kenh:'',type:'mini',sys:'MZ-V50-BP',name:'Hũ sơn mini base P - 50ml'}
  ]};save();}
  if(!DATA.skumap.rules)DATA.skumap.rules=[];
  // gop anh xa tay cu (neu co) thanh quy tac
  if(DATA.skumap.exact){Object.keys(DATA.skumap.exact).forEach(function(k){var e=DATA.skumap.exact[k];DATA.skumap.rules.push({pat:k,kenh:'',type:e.type||'',sys:e.sys,name:e.name||''});});delete DATA.skumap.exact;save();}
}
function matchPat(pat,s){ if(!pat||!s)return false; var re=new RegExp('^'+pat.replace(/[.+?^${}()|[\]\\]/g,'\\$&').replace(/\*/g,'.*')+'$','i'); return re.test(s); }
// Quy doi: tim quy tac dau tien khop SKU + (kenh trong/rong) -> tra SKU he thong + ten
function skuHe(o){ ensureSkumap(); var s=o.skuFix||o.sku; var k=o.kenh||'';
  for(var i=0;i<DATA.skumap.rules.length;i++){var r=DATA.skumap.rules[i];
    if((!r.kenh||r.kenh==='Tất cả'||r.kenh===k)&&matchPat(r.pat,s))
      return {code:r.sys,name:r.name||nm(r.sys)||r.sys,isBase:(r.type==='son1kg'||r.type==='mini'),sonType:r.type||'',matched:'quytac'};}
  for(var j=0;j<DATA.skumap.rules.length;j++){var rb=DATA.skumap.rules[j];if(rb.sys===s&&(rb.type==='son1kg'||rb.type==='mini'))return {code:s,name:nm(s)||rb.name||s,isBase:true,sonType:rb.type,matched:'sysbase'};}   // FIX: nhap thang SKU he thong base (vd SM-V01-BP) -> nhan dien la son base chiet, khong no combo
  var kk=skuKho(s); return {code:kk,name:nm(kk)||'',isBase:false,sonType:'',matched:(kk!==s?'L-':'none')};
}

function fmtDM(d){var p=(d||'').split(' ')[0].split('-');return p.length>=3?(p[2]+'/'+p[1]):d;}
function dotChips(){

  var hasDF=xkF.tuNgay||xkF.denNgay||xkF.thang||xkF.ngay;     // có lọc ngày/tháng?
  if(!hasDF){ var today=dotNow().split(' ')[0]; rows=rows.filter(({o})=>(o.ngay||o.dot.split(' ')[0])===today); }  // mặc định: chỉ HÔM NAY
  if(!rows.length)return '';
  var byDay={}; rows.forEach(({o})=>{ var d=(o.dot.indexOf(' ')>=0)?o.dot.split(' ')[0]:(o.ngay||''); (byDay[d]=byDay[d]||{})[o.dot]=1; });
  var days=Object.keys(byDay).sort().reverse();
  var H='<div class="bar" style="margin-top:-2px;gap:8px;flex-wrap:wrap;align-items:center"><span class="sub" style="font-weight:600">Đợt in / 出貨批次:</span>';
  days.forEach(function(d){
    var times=Object.keys(byDay[d]).sort().reverse();
    H+='<span style="display:inline-flex;gap:5px;align-items:center;flex-wrap:wrap;background:#eef2f8;border-radius:9px;padding:3px 8px"><span class="sub" style="font-weight:700;color:#334155">'+fmtDM(d)+'</span>';
    times.forEach(function(dot){ var t=(dot.indexOf(' ')>=0)?dot.split(' ')[1]:dot; H+='<span class="tag '+(xkDotSet[dot]?'t-info':'')+'" style="cursor:pointer;border:1px solid var(--line2)" onclick="toggleDot(\''+dot+'\')">'+(xkDotSet[dot]?'☑':'☐')+' '+t+'</span>'; });
    H+='</span>';
  });
  H+='<span class="sub">(mặc định: hôm nay · lọc ngày để xem đợt cũ · không tick = tất cả / 預設今日，篩選日期看舊批次)</span></div>';
  return H;
}

/* Gom các dòng đơn theo mã đơn (cho tab ① Kéo đơn) */
function ordsFiltered(){
  var rows=xkFilter(); if(xkHideDone)rows=rows.filter(x=>x.o.tt!=='Da xuat');
  var map={},order=[];
  rows.forEach(({o,i})=>{ if(!map[o.madon]){map[o.madon]={madon:o.madon,o:o,lines:[],idx:[]};order.push(o.madon);} map[o.madon].lines.push(o); map[o.madon].idx.push(i); });
  return order.map(m=>map[m]).sort(function(a,b){ var d=(b.o.ngay||'').localeCompare(a.o.ngay||''); if(d)return d; return Math.max.apply(null,b.idx)-Math.max.apply(null,a.idx); });
}

function xkFilter(){
  var q=(xkF.find||'').toLowerCase();var nd=s=>s.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/g,'d');

    (!xkF.kenh||o.kenh===xkF.kenh)&&(!xkF.thang||o.ngay.slice(0,7)===xkF.thang)&&(!xkF.tuNgay||o.ngay>=xkF.tuNgay)&&(!xkF.denNgay||o.ngay<=xkF.denNgay)&&
    (!xkF.dvvc||o.dvvc===xkF.dvvc)&&(!xkF.tthd||(o.tthd||'giao')===xkF.tthd)&&(!xkF.ttx||o.tt===xkF.ttx)&&(!xkF.mau||o.mau===xkF.mau)&&(!xkChietReqOnly||isChietReq(o))&&(!xkManualOnly||o._manual)&&
    (!q||nd((o.madon+' '+o.sku+' '+tenSan(o)+' '+nm(skuKho(o.sku))).toLowerCase()).indexOf(nd(q))>=0));
}

/* Bảng chiết màu: lọc theo loại sản phẩm (sơn 1kg / hũ mini), gom theo màu + tồn, in được */
function chietTable(){
  var TYPES=[['son1kg','Lon sơn 1kg'],['mini','Hũ sơn mini (L-MZ)']];
  var sel=`<div class="bar" style="margin:4px 0 8px"><span class="sub">Loại cần chiết:</span>`+
    TYPES.map(t=>`<button class="btn ${xkChietType===t[0]?'pri':''}" onclick="xkChietType='${t[0]}';xkDraw()">${t[1]}</button>`).join('')+
    `<div class="sp"></div><button class="btn" onclick="inChiet()">🖨 In danh sách chiết 列印調色清單</button></div>`;
  var rows=xkFilter().filter(({o})=>{o._he=skuHe(o);return o.tt==='Da xuat'&&dotPass(o)&&o._he.sonType===xkChietType;});
  var agg={};
  rows.forEach(({o})=>{var he=o._he;var key=he.code+'||'+(o.mau||'(không màu)');if(!agg[key])agg[key]={sys:he.code,name:he.name,mau:o.mau||'(không màu)',sl:0,don:0};agg[key].sl+=(+o.sl||0);agg[key].don++;});
  var keys=Object.keys(agg).sort();
  var __TON=computeTon();function tonOf(code){var r=__TON[code];return r?(r.dk+r.moi-(r.nb+r.hd+r.bh+r.qt+r.sx)):null;}
  var h=sel+`<table id="tblChiet"><tr><th>SKU hệ thống</th><th>Tên hệ thống</th><th>Màu cần chiết</th><th class="r">SL cần xuất</th><th class="r">Tồn còn (lon)</th><th class="r">Số đơn</th></tr>`;
  if(!keys.length)h+=`<tr><td colspan="6" class="sub" style="text-align:center;padding:14px">Chưa có đơn loại này đã xuất (theo bộ lọc). Lọc 🎨 Màu sơn / ĐVVC / ngày rồi xem.</td></tr>`;
  var totSys={};
  keys.forEach(k=>{var a=agg[k];var ton=tonOf(a.sys);totSys[a.sys]=(totSys[a.sys]||0)+a.sl;
    h+=`<tr><td class="mono">${a.sys}</td><td>${a.name}</td><td><b style="color:#9a6a00">${a.mau}</b></td><td class="r">${a.sl}</td><td class="r">${ton==null?'<span class="sub">—</span>':num(ton)}</td><td class="r">${a.don}</td></tr>`;});
  Object.keys(totSys).sort().forEach(sy=>{var ton=tonOf(sy);h+=`<tr style="background:#eef3fb;font-weight:700"><td colspan="3">Σ Tổng ${sy} cần xuất</td><td class="r">${totSys[sy]}</td><td class="r">${ton==null?'':num(ton)}</td><td></td></tr>`;});
  return h+'</table>';
}
function inChiet(){
  var rows=xkFilter().filter(({o})=>{o._he=skuHe(o);return o.tt==='Da xuat'&&dotPass(o)&&o._he.sonType===xkChietType;});
  if(!rows.length){alert('Không có dòng nào để in (theo loại + bộ lọc).');return;}
  var agg={};rows.forEach(({o})=>{var he=o._he;var key=he.code+'||'+(o.mau||'');if(!agg[key])agg[key]={sys:he.code,name:he.name,mau:o.mau||'',sl:0};agg[key].sl+=(+o.sl||0);});
  var keys=Object.keys(agg).sort();var body='';
  keys.forEach(k=>{var a=agg[k];body+=`<tr><td>${a.sys}</td><td>${a.name}</td><td class="mau">${a.mau}</td><td class="c">${a.sl}</td><td class="c"></td></tr>`;});
  var loai=(xkChietType==='son1kg'?'LON SƠN 1KG':'HŨ SƠN MINI (L-MZ)');
  el('printArea').innerHTML=`<div class="ph"><div class="ph-h"><div class="ttl">CÔNG TY TNHH LẬP NGUYÊN<br><span style="font-size:13px">DANH SÁCH CHIẾT MÀU — ${loai}</span></div>
    <div class="meta">Ngày: ${new Date().toLocaleDateString('vi-VN')}<br>Số dòng màu: <b>${keys.length}</b></div></div>
    <table class="ph-t"><tr><th>SKU hệ thống</th><th>Tên</th><th>Màu cần chiết</th><th>SL cần</th><th>Đã chiết ✔</th></tr>${body}</table>
    <div class="ph-foot"><div>Người chiết ____________</div><div>Người kiểm ____________</div></div></div>`;
  window.print();
}
/* Sửa SKU sai do sàn gắn nhầm — chỉ đổi ánh xạ, KHÔNG đụng dữ liệu gốc Haravan */
function suaSku(i){var o=DATA.orders[i];if(!o)return;
  var cur=o.skuFix||o.sku;
  var v=prompt('Sửa SKU cho đơn '+o.madon+'\nSKU sàn gốc (Haravan): '+o.sku+'\n\nNhập SKU đúng (sàn hoặc hệ thống). Để trống = trả về SKU gốc:',cur);
  if(v===null)return;v=v.trim();
  if(!v){delete o.skuFix;delete o.skuFixLog;}
  else{o.skuFix=v;o.skuFixLog=(o.skuFixLog||[]);o.skuFixLog.push({tu:cur,den:v,luc:new Date().toISOString()});}
  save();xkDraw();
}

    '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="text-align:left;color:var(--muted)"><th style="padding:2px">SKU đúng</th><th style="padding:2px">Tên SP</th><th style="padding:2px">Màu</th><th style="padding:2px;width:62px">SL</th><th style="width:30px"></th></tr></thead><tbody id="mLines">'+rowsHtml+'</tbody></table>'+

function kkDong(){ ensureKK();var done=Object.keys(DATA.kk.done).filter(c=>DATA.kk.done[c]);if(!done.length){alert('Chưa có mã đã xác nhận ✓.');return;}
  if(!confirm('Đóng kỳ '+done.length+' mã ĐÃ XÁC NHẬN?\nCHỉ những mã này chuyển sang kỳ mới; các mã khác GIỮ NGUYÊN, không bị đóng.'))return;
  var chotTs=_chotTs();
  var ymClose=_ymOfDate(DATA.kk.ngayChot||new Date().toISOString().slice(0,10));
  var ymNext=_nextYm(ymClose);
  var gStart0=DATA.periodStartTs||(DATA.periodStart?Date.parse(DATA.periodStart+'T00:00:00'):0);
  DATA.tonPts=DATA.tonPts||{}; DATA.tonKy=DATA.tonKy||{}; DATA.kyArchive=DATA.kyArchive||{};
  if(!DATA.kyArchive[ymClose])DATA.kyArchive[ymClose]={ngayChot:DATA.kk.ngayChot,lenh:DATA.kk.lenh,chotTs:chotTs,dongTs:Date.now(),rows:{}};
  // 1) Lưu "ảnh" kỳ vừa đóng cho TỪNG mã đã xác nhận (gom theo mốc bắt đầu để tính nhanh)
  var byStart={}; done.forEach(function(c){var st=(DATA.tonPts[c]!=null)?DATA.tonPts[c]:gStart0;(byStart[st]=byStart[st]||[]).push(c);});
  Object.keys(byStart).forEach(function(k){ var w=computeTonWindow(+k,chotTs,true,true); byStart[k].forEach(function(c){ DATA.kyArchive[ymClose].rows[c]=w[c]||{dk:0,moi:0,nb:0,hd:0,bh:0,qt:0,sx:0}; }); });
  // 2) Đặt đầu kỳ mới = Tồn thực tế (quy về lúc chốt) + mốc riêng cho TỪNG mã đã xác nhận; mã khác KHÔNG đụng tới
  done.forEach(function(c){
    var tc=DATA.kk.thuc[c]; var dk=(tc!=null&&tc!=='')?Number(tc):(DATA.kk.snap[c]||0);
    var r=DATA.ton.find(x=>x.code===c); if(r){r.dk=dk;r.moi=0;r.nb=0;r.hd=0;r.bh=0;r.qt=0;r.sx=0;} else DATA.ton.push({code:c,dk:dk,moi:0,nb:0,hd:0,bh:0,qt:0,sx:0});
    DATA.tonPts[c]=chotTs;   // mốc kỳ mới của riêng mã c = lúc bấm Chốt
    DATA.tonKy[c]=ymNext;    // tháng hiện hành mới của mã c
  });
  DATA.kkHistory=DATA.kkHistory||{};var ym=DATA.kk.ngayChot?DATA.kk.ngayChot.slice(0,7):(new Date().toISOString().slice(0,7));
  DATA.kkHistory[ym]={ngayChot:DATA.kk.ngayChot,lenh:DATA.kk.lenh,items:done.map(c=>{var lt=DATA.kk.snap[c]||0;var tc=DATA.kk.thuc[c];var th=(tc!=null&&tc!=='')?Number(tc):lt;var ppl=[];if(DATA.kk.p1[c])ppl.push(DATA.kk.p1[c]);if(DATA.kk.p2[c])ppl.push(DATA.kk.p2[c]);if(DATA.kk.p3[c])ppl.push(DATA.kk.p3[c]);return{code:c,lt:lt,thuc:th,diff:th-lt,ppl:ppl.join(', ')};})};
  // Gỡ các mã VỪA ĐÓNG khỏi bản kiểm kho; GIỮ NGUYÊN các mã còn lại để tiếp tục kiểm/đóng sau
  done.forEach(function(c){ ['snap','kk1','kk2','kk3','thuc','hide','p1','p2','p3','done','sel'].forEach(function(k){ if(DATA.kk[k]) delete DATA.kk[k][c]; }); });
  var conLai=Object.keys(DATA.kk.snap||{}).length;
  if(!conLai){ DATA.kk={ngayChot:'',snap:{},kk1:{},kk2:{},kk3:{},thuc:{},hide:{},p1:{},p2:{},p3:{},done:{},sel:{},lenh:'',confirmed:false}; }
  DATA.kk._tsC=DATA.kk._tsC||{};var _now=Date.now();done.forEach(function(c){DATA.kk._tsC[c]=_now;});DATA.kk._tsHead=_now;DATA.kk.ep=DATA.kk.ep||0;
  save();alert('Đã đóng kỳ '+done.length+' mã (chỉ mã đã xác nhận). Còn '+conLai+' mã trong bản kiểm để tiếp tục. Các mã khác giữ nguyên. Xuất/nhập sau chốt đã sang kỳ '+ymNext+'.');rKiemkho();
}

let dbSub='ngay', dbType='tp', dbMon='', dbFind='';
function dbND(s){return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/g,'d').replace(/Đ/g,'d').toLowerCase();}
function dbEvents(){ var ev=[]; var gd={};
  (DATA.orders||[]).forEach(function(o){ if(o.tt!=='Da xuat')return;
    if(o.split&&o.split.length){o.split.forEach(function(s){var h2=skuHe({sku:o.sku,kenh:o.kenh,skuFix:s.skuFix});var q=+s.sl||0;if(o.qua){ev.push({d:o.ngay,c:h2.code,t:'qt',q:q});}else if(h2.isBase){ev.push({d:o.ngay,c:h2.code,t:'bh',q:q});}else{explode(h2.code,q).forEach(function(x){ev.push({d:o.ngay,c:x.code,t:'bh',q:x.qty});});}});return;}
    var he=skuHe(o);
    if(o.qua){ev.push({d:o.ngay,c:he.code,t:'qt',q:+o.sl||0});}
    else if(he.isBase){ev.push({d:o.ngay,c:he.code,t:'bh',q:+o.sl||0});}
    else { explode(he.code,o.sl).forEach(function(x){ev.push({d:o.ngay,c:x.code,t:'bh',q:x.qty});}); }
  });
  (DATA.orders||[]).forEach(function(o){ if(o.tt!=='Da xuat'||gd[o.madon])return; gd[o.madon]=1; (giftFor(o)||[]).forEach(function(gr){ev.push({d:o.ngay,c:gr.sku,t:'qt',q:+gr.sl||0});}); });
  (DATA.xnb||[]).forEach(function(r){ev.push({d:r.ngay,c:r.sku,t:'nb',q:+r.sl||0});});
  (DATA.xhd||[]).forEach(function(r){ev.push({d:r.ngay,c:r.sku,t:'hd',q:+r.sl||0});});
  (DATA.nx||[]).forEach(function(r){ if(r.loai==='xuat')ev.push({d:r.ngay,c:r.code,t:'sx',q:+r.sl||0});});
  return ev.filter(function(e){return e.c&&e.d&&e.q;});
}
function dbTrend(lm,pm){ if(pm===0)return lm>0?'<span style="color:#1e8e4e;font-weight:600">mới</span>':'<span class="sub">–</span>'; var d=lm-pm; var pct=Math.round(d/pm*100); if(d>0)return '<span style="color:#1e8e4e;font-weight:600">▲ +'+pct+'%</span>'; if(d<0)return '<span style="color:#c0392b;font-weight:600">▼ '+pct+'%</span>'; return '<span class="sub">0%</span>'; }
function dbTypeTabs(){ return `<div class="tabs2" style="margin-top:8px"><button class="${dbType==='nvl'?'on':''}" onclick="dbType='nvl';rDashboard()">Nguyên liệu / 原料</button><button class="${dbType==='tp'?'on':''}" onclick="dbType='tp';rDashboard()">Thành phẩm / 成品</button></div>`; }
function dbProdSet(){ var m={}; DATA.products.filter(function(p){return dbType==='nvl'?p.type==='NVL':p.type==='Thành phẩm';}).forEach(function(p){m[p.code]=p;}); return m; }
function rDashboard(){
  var EV=dbEvents();
  var today=new Date().toISOString().slice(0,10);
  var months=uniq(EV.map(function(e){return e.d.slice(0,7);})).sort();
  if(!dbMon)dbMon=months.length?months[months.length-1]:today.slice(0,7);
  var sumToday=EV.filter(function(e){return e.d===today;}).reduce(function(a,b){return a+b.q;},0);
  var sumMon=EV.filter(function(e){return e.d.slice(0,7)===dbMon;}).reduce(function(a,b){return a+b.q;},0);
  var nDon=uniq((DATA.orders||[]).filter(function(o){return o.tt==='Da xuat';}).map(function(o){return o.madon;})).length;
  var hetN=DATA.ton.filter(function(r){return tonCalc(r).ton<=0;}).length;
  el('p-dashboard').innerHTML=H('Dashboard theo dõi xuất kho','出貨報表')+`
  <div class="kpis">
    <div class="kpi"><div class="l">Xuất hôm nay</div><div class="v">${num(sumToday)}</div></div>
    <div class="kpi"><div class="l">Xuất tháng ${dbMon.slice(5)}/${dbMon.slice(0,4)}</div><div class="v">${num(sumMon)}</div></div>
    <div class="kpi"><div class="l">Đơn đã xuất</div><div class="v">${num(nDon)}</div></div>
    <div class="kpi"><div class="l">SP sắp hết</div><div class="v" style="color:var(--red)">${hetN}</div></div>
  </div>
  <div class="tabs2" style="margin-top:6px">
    <button class="${dbSub==='ngay'?'on':''}" onclick="dbSub='ngay';rDashboard()">📅 Xuất theo ngày 按日 (lưới cả tháng)</button>
    <button class="${dbSub==='thang'?'on':''}" onclick="dbSub='thang';rDashboard()">📆 Xuất theo tháng 按月 (so sánh)</button>
  </div><div id="dbBody"></div>`;
  if(dbSub==='ngay')dbNgay(EV); else dbThang(EV);
}
function dbNgay(EV){
  var months=uniq(EV.map(function(e){return e.d.slice(0,7);})).sort();
  if(!dbMon)dbMon=months.length?months[months.length-1]:new Date().toISOString().slice(0,7);
  var y=+dbMon.slice(0,4), mo=+dbMon.slice(5,7); var lastDay=new Date(y,mo,0).getDate();
  var days=[];for(var i=1;i<=lastDay;i++)days.push(i);
  var cs=dbProdSet();
  var mp={}; EV.forEach(function(e){ if(e.d.slice(0,7)!==dbMon||!cs[e.c])return; var dd=+e.d.slice(8,10); mp[e.c+'|'+dd]=(mp[e.c+'|'+dd]||0)+e.q; });
  var q=dbND(dbFind);
  var codes=uniq(EV.filter(function(e){return e.d.slice(0,7)===dbMon&&cs[e.c];}).map(function(e){return e.c;})).filter(function(c){return !q||dbND(c+' '+(nm(c)||'')).indexOf(q)>=0;});
  function tot(c){return days.reduce(function(a,d){return a+(mp[c+'|'+d]||0);},0);}
  function catL(c){var p=cs[c];var ck=p?p.ck:'';return (DATA.cats&&DATA.cats[ck])||ck||'(Khác)';}
  codes.sort(function(a,b){var ca=catL(a),cb=catL(b);if(ca!==cb)return ca<cb?-1:1;return tot(b)-tot(a);});
  var monOpts=months.map(function(m){return `<option ${dbMon===m?'selected':''}>${m}</option>`;}).join('')||('<option>'+dbMon+'</option>');
  var head='<tr><th style="position:sticky;left:0;background:#f4f6fa">SKU</th><th>Tên</th><th>ĐVT</th>'+days.map(function(d){return `<th class="r" style="min-width:30px">${d}</th>`;}).join('')+'<th class="r">Tổng</th></tr>';
  var body='',curCat=null;
  codes.forEach(function(c){ var cat=catL(c); if(cat!==curCat){curCat=cat;body+=`<tr><td colspan="${days.length+4}" style="font-weight:700;color:#1f3a5f;background:#e7eef8;padding:6px 9px;position:sticky;left:0">▸ ${cat}</td></tr>`;}
    var cells=days.map(function(d){var v=mp[c+'|'+d]||0;return `<td class="r">${v?num(v):'<span style="color:#e2e6ee">·</span>'}</td>`;}).join('');
    body+=`<tr><td class="mono" style="position:sticky;left:0;background:#fff">${c}</td><td>${nm(c)||''}</td><td class="sub">${unit(c)}</td>${cells}<td class="r" style="font-weight:700;background:#fdf4f3;color:#b03a2e">${num(tot(c))}</td></tr>`;
  });
  if(!codes.length)body=`<tr><td colspan="${days.length+4}" class="sub" style="text-align:center;padding:14px">Tháng ${dbMon} chưa có ${dbType==='nvl'?'nguyên liệu':'thành phẩm'} nào xuất kho.</td></tr>`;
